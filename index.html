<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ប្រព័ន្ធវាយតម្លៃសិស្ស</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

  <!-- LOGIN SCREEN -->
  <div id="login-screen"
       class="fixed inset-0 flex items-center justify-center bg-gradient-to-br from-teal-900 to-emerald-900">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

      <h1 class="text-2xl font-bold text-center text-teal-800 mb-2">
        ប្រព័ន្ធវាយតម្លៃសិស្ស
      </h1>

      <p class="text-center text-slate-500 mb-6">
        សូមចូលប្រើប្រាស់ប្រព័ន្ធ
      </p>

      <div id="login-error"
           class="hidden bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm font-bold">
        Username ឬ Password មិនត្រឹមត្រូវ
      </div>

      <form id="login-form">

        <div class="mb-4">
          <label class="block mb-2 font-bold">
            Username
          </label>

          <input
            type="text"
            id="login-username"
            class="w-full border border-slate-300 rounded-lg px-4 py-3"
            placeholder="admin"
            required
          >
        </div>

        <div class="mb-6">
          <label class="block mb-2 font-bold">
            Password
          </label>

          <input
            type="password"
            id="login-password"
            class="w-full border border-slate-300 rounded-lg px-4 py-3"
            placeholder="********"
            required
          >
        </div>

        <button
          type="submit"
          class="w-full bg-teal-700 hover:bg-teal-600 text-white py-3 rounded-lg font-bold">
          ចូលប្រើប្រាស់
        </button>

      </form>

    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-container" class="hidden min-h-screen">

    <div class="bg-white shadow p-4 flex justify-between items-center">

      <h2 class="text-xl font-bold text-teal-800">
        Dashboard
      </h2>

      <button
        onclick="logout()"
        class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg font-bold">
        Logout
      </button>

    </div>

    <div class="p-6">

      <div class="bg-white rounded-xl shadow p-6">

        <h3 class="text-lg font-bold mb-2">
          ស្វាគមន៍មកកាន់ប្រព័ន្ធ
        </h3>

        <p class="text-slate-600">
          Login ដំណើរការជោគជ័យលើ GitHub Pages
        </p>

      </div>

    </div>

  </div>

  <script>

    // USERNAME & PASSWORD
    const USERNAME = "admin";
    const PASSWORD = "admin_khmer";

    // CHECK LOGIN
    function checkAuth() {

      const isLoggedIn =
        localStorage.getItem("moeys_auth") === "true";

      if (isLoggedIn) {

        document.getElementById("login-screen").style.display = "none";

        document.getElementById("app-container").classList.remove("hidden");

      } else {

        document.getElementById("login-screen").style.display = "flex";

        document.getElementById("app-container").classList.add("hidden");

      }
    }

    // LOGIN
    document
      .getElementById("login-form")
      .addEventListener("submit", function(e) {

        e.preventDefault();

        const username =
          document.getElementById("login-username").value.trim();

        const password =
          document.getElementById("login-password").value.trim();

        const errorDiv =
          document.getElementById("login-error");

        if (
          username === USERNAME &&
          password === PASSWORD
        ) {

          localStorage.setItem("moeys_auth", "true");

          errorDiv.classList.add("hidden");

          checkAuth();

        } else {

          errorDiv.classList.remove("hidden");

        }

      });

    // LOGOUT
    function logout() {

      localStorage.removeItem("moeys_auth");

      location.reload();

    }

    // START
    checkAuth();

  </script>

</body>
</html>
